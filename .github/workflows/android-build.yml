name: Build Android APK

on:
  push:
    branches: ['**']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Run :shared unit tests
        working-directory: android
        # assembleDebug only compiles :shared (as a dependency of :app) - it never executes
        # its commonTest suite, so a broken WorkoutLogicTest/ReminderScheduleTest could pass
        # CI indefinitely without this running explicitly.
        run: ./gradlew :shared:testDebugUnitTest

      - name: Build debug APK
        working-directory: android
        # versionCode = the Actions run number (always increasing, unique per
        # build) so the in-app "Check for updates" button (src/utils/updateCheck.js)
        # can compare the installed build against the latest GitHub Release.
        run: ./gradlew assembleDebug -PappVersionCode=${{ github.run_number }} -PappVersionName=1.0.${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: daily-routines-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish latest build as a GitHub Release
        # Only the main dev branch counts as a "release" - other branches
        # still build/upload as an artifact above, but shouldn't overwrite
        # the release the in-app update checker points at.
        if: github.ref == 'refs/heads/claude/android-routines-app-mvp-gjl4kh'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-android
          name: "Latest build (run ${{ github.run_number }})"
          body: |
            Automatically published debug build from commit ${{ github.sha }}.
            versionCode: ${{ github.run_number }}
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
