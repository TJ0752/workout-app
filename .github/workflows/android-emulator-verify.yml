name: Verify Android Notifications (Emulator)

# Manual only - booting a KVM-accelerated emulator adds several minutes over
# the plain APK build, so this isn't run on every push. Use it to verify real
# on-device notification behavior (native due-by reminder catch-up/reappear-
# on-dismiss, group-summary, workout timer foreground service) that can't be
# checked by the Node-level mock tests or the plain APK build in
# android-build.yml.
on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/android-routines-app-mvp-gjl4kh

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot an API 36 (Android 16) emulator and run the full verify suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            echo "Booted successfully. Reported version:"
            adb shell getprop ro.build.version.release
            adb shell getprop ro.build.version.sdk
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            # Android 13+ (POST_NOTIFICATIONS) and 10+ (ACTIVITY_RECOGNITION, dangerous since
            # API 29) both gate behind a real system permission dialog that no automation here
            # taps - pre-granting via adb is the standard way to test the granted-permission
            # path without needing UI Automator to click through a system dialog. This is new
            # as of running on API 33+ for the first time; the previous API 30 target never
            # exercised POST_NOTIFICATIONS since that permission didn't exist before API 33.
            adb shell pm grant com.tharuka.routines android.permission.POST_NOTIFICATIONS || true
            adb shell pm grant com.tharuka.routines android.permission.ACTIVITY_RECOGNITION || true
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-due-reminder.mjs
            adb shell am force-stop com.tharuka.routines
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-group-summary.mjs
            adb shell am force-stop com.tharuka.routines
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-workout-session-notification.mjs
