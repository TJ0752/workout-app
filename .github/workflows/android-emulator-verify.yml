name: Verify Android Notifications (Emulator)

# Manual only - booting a KVM-accelerated emulator adds several minutes over
# the plain APK build, so this isn't run on every push. Use it to verify real
# on-device notification behavior (native due-by reminder catch-up/reappear-
# on-dismiss, extra reminders, group-summary, daily digests/streak-risk, the
# persistent background-sync foreground service, and the workout timer
# foreground service) that can't be checked by the Node-level mock tests or
# the plain APK build in android-build.yml.
on:
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator, install APK, and verify notification catch-up
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          # No `adb shell am force-stop` between scripts (relaunching via `am start` alone gets a
          # fresh Activity/WebView for the next script). `adb shell am broadcast -n <receiver>`
          # (previously used to fire alarm/action receivers on demand instead of waiting on
          # AlarmManager's real clock) turned out to be fundamentally unreliable on this emulator
          # image regardless of force-stop, `--include-stopped-packages`, or timeouts - confirmed
          # via a temporary Log.i() placed directly inside a receiver, which proved the broadcast
          # never even reached onReceive(). verify-extra-reminder.mjs no longer uses it at all
          # (real clock-jump + real uiautomator taps instead - see its file header); the other
          # scripts still using `am broadcast` (verify-daily-digest.mjs, verify-background-sync.mjs,
          # verify-group-summary.mjs) are known-affected and pending the same rework.
          #
          # TEMPORARY: only running due-reminder + extra-reminder below while validating the new
          # technique - restore the other 4 scripts once confirmed, then rework them the same way.
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-due-reminder.mjs
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-extra-reminder.mjs
