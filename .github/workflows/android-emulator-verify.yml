name: Verify Android Notifications (Emulator)

# Manual only - booting a KVM-accelerated emulator adds several minutes over
# the plain APK build, so this isn't run on every push. Use it to verify real
# on-device notification behavior (native due-by reminder catch-up/reappear-
# on-dismiss, group-summary, workout timer foreground service) that can't be
# checked by the Node-level mock tests or the plain APK build in
# android-build.yml.
on:
  workflow_dispatch: {}
  # TEMPORARY - branch-scoped push trigger to verify the id-collision regression check in
  # verify-workout-session-notification.mjs on a real emulator. Remove once confirmed green.
  push:
    branches:
      - claude/android-routines-app-mvp-gjl4kh

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator, install APK, and verify notification catch-up
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-due-reminder.mjs
            adb shell am force-stop com.tharuka.routines
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-group-summary.mjs
            adb shell am force-stop com.tharuka.routines
            adb shell am start -n com.tharuka.routines/.MainActivity
            node scripts/verify-workout-session-notification.mjs
